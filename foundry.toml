[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000
via_ir = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC}"
